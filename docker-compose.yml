version: '3.8'

services:

  postgres-auth:
    image: postgres:16
    container_name: pg-auth
    environment:
      POSTGRES_DB: db_auth
      POSTGRES_USER: usuario_cordillera
      POSTGRES_PASSWORD: cordillera_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data

volumes:
  postgres_auth_data: