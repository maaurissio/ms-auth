version: '3.8'

services:

  db-auth:
    image: postgres:16
    container_name: pg-auth
    environment:
      POSTGRES_USER: usuario_cordillera
      POSTGRES_PASSWORD: cordillera_pass
      POSTGRES_DB: db_auth
    ports:
      - "5433:5432"
    volumes:
      - pgdata_auth:/var/lib/postgresql/data
    networks:
      - cordillera-net

  ms-auth:
    build: .
    container_name: ms-auth
    depends_on:
      - db-auth
    ports:
      - "8081:8081"
    environment:
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: usuario_cordillera
      QUARKUS_DATASOURCE_PASSWORD: cordillera_pass
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://db-auth:5432/db_auth
    networks:
      - cordillera-net

networks:
  cordillera-net:
    driver: bridge

volumes:
  pgdata_auth: